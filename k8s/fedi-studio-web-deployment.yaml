apiVersion: apps/v1
kind: Deployment
metadata:
  name: fedi-studio-web
  namespace: fedi-discover
  labels:
    app: fedi-studio-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fedi-studio-web
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: '2026-05-01T13:17:01-07:00'
      labels:
        app: fedi-studio-web
    spec:
      automountServiceAccountToken: false
      containers:
      - command:
        - uvicorn
        - fedi_studio.web.app:app
        - --host
        - 0.0.0.0
        - --port
        - '8000'
        env:
        - name: V1_DSN
          value: host=fedi-postgresql.fedi-discover.svc.cluster.local port=5432 dbname=fedi_discover_full
            user=mastodon password=mastodon
        - name: V2_DSN
          value: host=fedi-postgresql.fedi-discover.svc.cluster.local port=5432 dbname=fedi_studio
            user=mastodon password=mastodon
        - name: FEDI_STUDIO_DSN
          value: host=fedi-postgresql.fedi-discover.svc.cluster.local port=5432 dbname=fedi_studio
            user=mastodon password=mastodon
        - name: MASTODON_URL
          value: https://holm.community
        - name: MASTODON_TOKEN
          valueFrom:
            secretKeyRef:
              key: mastodon-token
              name: fedi-discover-secrets
        - name: SCORER_PATH
          value: /app/models/scorer_v2.pkl
        - name: ENRICH_BATCH
          value: '100'
        - name: ENRICH_POLL_S
          value: '15'
        - name: MAX_CONCURRENCY
          value: '30'
        - name: PYTHONUNBUFFERED
          value: '1'
        - name: HF_HOME
          value: /tmp/.cache
        image: 192.168.8.197:30080/tim/fedi-studio:latest
        imagePullPolicy: Always
        name: fedi-studio-web
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /tmp
          name: tmp
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      volumes:
      - emptyDir: {}
        name: tmp
